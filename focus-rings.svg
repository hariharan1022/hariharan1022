  </g>
  <text x="320" y="172" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#a7a9be" text-anchor="middle">AI Apps</text>

  <line x1="24" y1="200" x2="366" y2="200" stroke="#1f2340" stroke-width="1"/>

  <text x="24" y="228" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="#f4f5f7">Let's Connect</text>

