      stroke-dasharray="264" stroke-dashoffset="264">
      <animate attributeName="stroke-dashoffset" from="264" to="40" dur="1.5s" begin="0.15s" fill="freeze"/>
    </circle>
    <text y="6" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#f4f5f7" text-anchor="middle">85%</text>
